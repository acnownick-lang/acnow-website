<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Thermodynamic Airflow Simulation | A/C Now LLC</title>
    <style>
        :root {
            --dark: #0a182f;
            --blue-glow: rgba(0, 242, 254, 0.4);
            --red-glow: rgba(255, 75, 43, 0.4);
            --font-stack: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark);
            color: #ffffff;
            font-family: var(--font-stack);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Glassmorphic UI overlays */
        .ui-container {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
            pointer-events: none;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px;
            width: 250px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
        }

        h1 {
            font-size: 15px;
            font-weight: 700;
            margin: 0 0 6px 0;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 11px;
            line-height: 1.4;
            color: #b0c4de;
            margin: 0 0 12px 0;
        }

        .legend {
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            font-size: 10.5px;
            color: #e2e8f0;
        }

        .legend-color {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            margin-right: 6px;
            box-shadow: 0 0 6px currentColor;
        }

        .color-red { background-color: #ff4b2b; color: var(--red-glow); }
        .color-purple { background-color: #a18cd1; color: rgba(161, 140, 209, 0.4); }
        .color-blue { background-color: #00f2fe; color: var(--blue-glow); }

        .controls-hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 9px;
            letter-spacing: 1px;
            color: #a0aec0;
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
            text-transform: uppercase;
            white-space: nowrap;
        }

        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hud-status {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-end;
            pointer-events: auto;
        }

        .badge {
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid rgba(0, 242, 254, 0.3);
            color: #00f2fe;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.1);
        }

        .badge.active {
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="ui-container">
        <div class="card">
            <h1>Airflow Circulation Map</h1>
            <p>Interactive 3D model. Warm return air (red) is cooled (purple) and redistributed as chilled supply air (blue) to living zones.</p>
            
            <div class="legend">
                <div class="legend-item">
                    <span class="legend-color color-red"></span>
                    <span>78°F Return Air</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color color-purple"></span>
                    <span>Evaporator Cooling</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color color-blue"></span>
                    <span>55°F Supply Flow</span>
                </div>
            </div>
        </div>
    </div>

    <div class="hud-status">
        <div class="badge active">● SIMULATION ACTIVE</div>
    </div>

    <div class="controls-hint">Drag to rotate • Pinch to zoom</div>
    <canvas id="webgl-canvas"></canvas>

    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        const canvas = document.getElementById('webgl-canvas');
        let scene, camera, renderer, controls;
        let particles, particleProgress = [];
        let houseShell, ducts = [];
        let lastTime = 0;

        const PARTICLE_COUNT = 1000;
        const FLOW_SPEED = 0.08;

        const returnAirPath = new THREE.CatmullRomCurve3([
            new THREE.Vector3(-15, -4, 10),
            new THREE.Vector3(-10, -3, 8),
            new THREE.Vector3(-4, -1, 4),
            new THREE.Vector3(0, 0, 0)
        ]);

        const supplyZoneAPath = new THREE.CatmullRomCurve3([
            new THREE.Vector3(0, 1, 0),
            new THREE.Vector3(2, 4, -2),
            new THREE.Vector3(6, 4, -4),
            new THREE.Vector3(12, 3, -8)
        ]);

        const supplyZoneBPath = new THREE.CatmullRomCurve3([
            new THREE.Vector3(0, 1, 0),
            new THREE.Vector3(-2, 4, -1),
            new THREE.Vector3(-8, 4, 2),
            new THREE.Vector3(-14, 3, 4)
        ]);

        const supplyZoneCPath = new THREE.CatmullRomCurve3([
            new THREE.Vector3(0, 1, 0),
            new THREE.Vector3(1, 4, 3),
            new THREE.Vector3(8, 4, 6),
            new THREE.Vector3(14, 3, 8)
        ]);

        const curves = [returnAirPath, supplyZoneAPath, supplyZoneBPath, supplyZoneCPath];

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0a182f, 0.015);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(25, 18, 38);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.01;
            controls.minDistance = 15;
            controls.maxDistance = 100;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambientLight);

            const directionalLight1 = new THREE.DirectionalLight(0x00f2fe, 0.8);
            directionalLight1.position.set(20, 40, 20);
            scene.add(directionalLight1);

            const directionalLight2 = new THREE.DirectionalLight(0xff4b2b, 0.4);
            directionalLight2.position.set(-20, 20, -20);
            scene.add(directionalLight2);

            buildHouseGeometry();
            buildDuctTubes();
            initParticles();

            window.addEventListener('resize', onWindowResize);
            requestAnimationFrame(animate);
        }

        function buildHouseGeometry() {
            const houseGroup = new THREE.Group();

            const outerGeo = new THREE.BoxGeometry(36, 16, 26);
            const outerMat = new THREE.MeshStandardMaterial({
                color: 0x2e4057,
                roughness: 0.1,
                metalness: 0.8,
                transparent: true,
                opacity: 0.08,
                side: THREE.DoubleSide
            });
            const outerMesh = new THREE.Mesh(outerGeo, outerMat);
            outerMesh.position.y = 2.5;
            houseGroup.add(outerMesh);

            const edges = new THREE.EdgesGeometry(outerGeo);
            const lineMat = new THREE.LineBasicMaterial({ color: 0x4a6fa5, transparent: true, opacity: 0.25 });
            const line = new THREE.LineSegments(edges, lineMat);
            line.position.y = 2.5;
            houseGroup.add(line);

            const gridHelper = new THREE.GridHelper(100, 50, 0x4a6fa5, 0x1d2d44);
            gridHelper.position.y = -5.5;
            houseGroup.add(gridHelper);

            const ahGeo = new THREE.BoxGeometry(4, 8, 3.5);
            const ahMat = new THREE.MeshStandardMaterial({
                color: 0x2d3748,
                roughness: 0.4,
                metalness: 0.9,
                transparent: true,
                opacity: 0.85
            });
            const airHandler = new THREE.Mesh(ahGeo, ahMat);
            airHandler.position.set(0, -1.5, 0);
            houseGroup.add(airHandler);

            const coilGeo = new THREE.BoxGeometry(3.9, 2, 3.4);
            const coilMat = new THREE.MeshBasicMaterial({
                color: 0xa18cd1,
                wireframe: true,
                transparent: true,
                opacity: 0.6
            });
            const coil = new THREE.Mesh(coilGeo, coilMat);
            coil.position.set(0, -1.5, 0);
            houseGroup.add(coil);

            scene.add(houseGroup);
            houseShell = houseGroup;
        }

        function buildDuctTubes() {
            curves.forEach((curve, index) => {
                const tubeGeo = new THREE.TubeGeometry(curve, 32, 0.5, 8, false);
                const tubeMat = new THREE.MeshStandardMaterial({
                    color: index === 0 ? 0xff4b2b : 0x00f2fe,
                    transparent: true,
                    opacity: 0.1,
                    wireframe: true
                });
                const tube = new THREE.Mesh(tubeGeo, tubeMat);
                scene.add(tube);
                ducts.push(tube);
            });
        }

        function initParticles() {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const colors = new Float32Array(PARTICLE_COUNT * 3);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const curveIndex = Math.floor(Math.random() * curves.length);
                const progress = Math.random();
                
                particleProgress.push({
                    curveIndex: curveIndex,
                    progress: progress
                });

                const point = curves[curveIndex].getPointAt(progress);
                const randomOffset = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.6,
                    (Math.random() - 0.5) * 0.6,
                    (Math.random() - 0.5) * 0.6
                );
                const finalPos = point.add(randomOffset);

                positions[i * 3] = finalPos.x;
                positions[i * 3 + 1] = finalPos.y;
                positions[i * 3 + 2] = finalPos.z;

                const color = getAirflowColor(curveIndex, progress);
                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const texture = createParticleTexture();
            const material = new THREE.PointsMaterial({
                size: 0.6,
                map: texture,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                opacity: 0.8
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function createParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.2, 'rgba(255, 255, 255, 0.8)');
            gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.3)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 16, 16);
            return new THREE.CanvasTexture(canvas);
        }

        function getAirflowColor(curveIndex, progress) {
            const color = new THREE.Color();
            if (curveIndex === 0) {
                color.lerpColors(new THREE.Color(0xff4b2b), new THREE.Color(0xa18cd1), progress);
            } else {
                color.lerpColors(new THREE.Color(0x00c6ff), new THREE.Color(0x0072ff), progress);
            }
            return color;
        }

        function animate(timestamp) {
            requestAnimationFrame(animate);

            const delta = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            const dt = Math.min(delta, 0.1);

            if (particles) {
                const positions = particles.geometry.attributes.position.array;
                const colors = particles.geometry.attributes.color.array;

                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const data = particleProgress[i];
                    data.progress += FLOW_SPEED * dt;

                    if (data.progress > 1.0) {
                        data.progress = 0.0;
                    }

                    const curve = curves[data.curveIndex];
                    const point = curve.getPointAt(data.progress);

                    const seed = i * 0.1;
                    const noiseX = Math.sin(seed + timestamp * 0.002) * 0.2;
                    const noiseY = Math.cos(seed * 0.7 + timestamp * 0.003) * 0.2;
                    const noiseZ = Math.sin(seed * 1.3 + timestamp * 0.001) * 0.2;

                    positions[i * 3] = point.x + noiseX;
                    positions[i * 3 + 1] = point.y + noiseY;
                    positions[i * 3 + 2] = point.z + noiseZ;

                    const col = getAirflowColor(data.curveIndex, data.progress);
                    colors[i * 3] = col.r;
                    colors[i * 3 + 1] = col.g;
                    colors[i * 3 + 2] = col.b;
                }

                particles.geometry.attributes.position.needsUpdate = true;
                particles.geometry.attributes.color.needsUpdate = true;
            }

            if (houseShell) {
                houseShell.rotation.y = Math.sin(timestamp * 0.0001) * 0.05;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
